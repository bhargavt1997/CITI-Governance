name: Deploy frontend to GitHub Pages

# Publishes ONLY the React frontend to GitHub Pages (Pages can't run the Spring Boot backend or Postgres).
# The frontend talks to a backend hosted elsewhere via the VITE_API_BASE_URL repository variable.
#
# Setup (one time):
#   1. Repo Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   2. Repo Settings → Secrets and variables → Actions → Variables → add:
#        VITE_API_BASE_URL = https://<your-backend-host>/api   (e.g. https://citi-governance.onrender.com/api)
#   3. On the backend host, set APP_CORS_ALLOWED_ORIGINS=https://<your-user>.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          # Project page lives under /<repo-name>/
          VITE_BASE: /CITI-Governance/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build
      - name: SPA fallback (serve index.html for unknown routes)
        run: cp frontend/dist/index.html frontend/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
