services:
  postgres:
    image: postgres:16-alpine
    container_name: citi-governance-db
    environment:
      POSTGRES_DB: citi_governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance -d citi_governance"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: citi-governance-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/citi_governance
      SPRING_DATASOURCE_USERNAME: governance
      SPRING_DATASOURCE_PASSWORD: governance
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
